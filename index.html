<style>

/* PART 2 CSS YAHAN PASTE KARNA */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0a57ff,#00a9ff);

}

.header h1{

font-weight:700;
}

.badge{

margin-top:10px;

background:#fff;

border-radius:20px;

.content{
padding:24px;
}

.content h2{
margin-bottom:10px;
color:#222;
}

.content p{

color:#555;

}

.price{
margin:20px 0;
padding:18px;
text-align:center;
border-radius:15px;
background:#eafbf0;
border:2px dashed #18a84a;
}

.price h3{
font-size:40px;
color:#18a84a;
font-weight:700;
}

.price div{
margin-top:6px;
font-size:16px;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#0057ff;
box-shadow:0 0 8px rgba(0,87,255,.25);
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:17px;
font-weight:700;
cursor:pointer;
color:#fff;

}

#pay{
background:#ff6b00;
}

#pay:hover{
background:#e85b00;

#send{

}

height:26px;

.header h1{

<body>

<!-- Floating WhatsApp Support Button -->
<a
href="https://wa.me/919236414171?text=Hello%20AINEX%20SERVICES,%20I%20need%20support."
class="support-btn"

<svg xmlns="http://www.w3.org/2000/svg"

<div class="card">

<div class="header">

<h1>BY AINEX SERVICES</h1>

<div class="badge">
Learning Licence Apply
</div>

</div>

<div class="content">

<h2>🚗 Learning Licence</h2>

<p>Fill all details carefully.</p>

<div class="price">
<h3>₹90</h3>
<div>Service Charge</div>
</div>

<input
id="name"
type="text"
placeholder="Enter Full Name"
autocomplete="name"
style="text-transform:uppercase;">

<input
id="password"
type="tel"
inputmode="numeric"
maxlength="12"
placeholder="Enter Password">

<input
id="dob"
type="tel"
inputmode="numeric"
maxlength="10"
placeholder="Enter DOB (DD/MM/YYYY)">

<input
id="utr"
type="tel"
inputmode="numeric"
maxlength="12"
placeholder="Enter UTR Number">

<button id="pay">
💳 Pay ₹90
</button>

<button
id="send"
onclick="sendWA()">
📩 Submit
</button>

</div>

</div>

<script>

/* PART 3 JAVASCRIPT YAHAN PASTE KARNA */
// Pay Button
document.getElementById("pay").addEventListener("click", function () {
window.location.href =
"upi://pay?pa=9236414171@pz&pn=AINEX%20SERVICES&am=90&cu=INR";
});

// NAME AUTO CAPITAL
const nameInput = document.getElementById("name");
nameInput.addEventListener("input", function () {
this.value = this.value.toUpperCase();
});

// MOBILE AUTO NEXT
const mobile = document.getElementById("mobile");
mobile.addEventListener("input", function () {
this.value = this.value.replace(/\D/g,"").slice(0,10);

if(this.value.length===10){
document.getElementById("idno").focus();
}
});

// AADHAAR AUTO NEXT
const aadhaar = document.getElementById("idno");
aadhaar.addEventListener("input", function () {
this.value = this.value.replace(/\D/g,"").slice(0,12);

if(this.value.length===12){
document.getElementById("dob").focus();
}
});

// DOB AUTO FORMAT + NEXT
const dob = document.getElementById("dob");
dob.addEventListener("input", function () {

let value = this.value.replace(/\D/g,"").substring(0,8);

if(value.length>4){
value=value.substring(0,2)+"/"+value.substring(2,4)+"/"+value.substring(4);
}
else if(value.length>2){
value=value.substring(0,2)+"/"+value.substring(2);
}

this.value=value;

if(this.value.length===10){
document.getElementById("utr").focus();
}

});

// UTR
const utr = document.getElementById("utr");
utr.addEventListener("input", function () {
this.value=this.value.replace(/\D/g,"").slice(0,12);
});

// SUBMIT
function sendWA(){

const name=nameInput.value.trim();
const mob=mobile.value.trim();
const ad=aadhaar.value.trim();
const db=dob.value.trim();
const ut=utr.value.trim();

if(name===""){
alert("Enter Full Name");
nameInput.focus();
return;
}

if(!/^\d{10}$/.test(mob)){
alert("Mobile Number must be exactly 10 digits");
mobile.focus();
return;
}

if(!/^\d{12}$/.test(ad)){
alert("Aadhaar Number must be exactly 12 digits");
aadhaar.focus();
return;
}

if(!/^\d{2}\/\d{2}\/\d{4}$/.test(db)){
alert("Enter Valid DOB (DD/MM/YYYY)");
dob.focus();
return;
}

if(!/^\d{8,12}$/.test(ut)){
alert("UTR Number must be 8 to 12 digits");
utr.focus();
return;
}

const msg =
`🚗 *LEARNING LICENCE APPLY*

👤 NAME : ${name}
📱 MOBILE : ${mob}
🆔 AADHAAR : ${ad}
🎂 DOB : ${db}
💳 UTR : ${ut}`;

window.open(
`https://wa.me/919236414171?text=${encodeURIComponent(msg)}`,
"_blank"
);

}
</script>
