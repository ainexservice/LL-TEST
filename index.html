<script>
/* PART 3 JAVASCRIPT YAHAN PASTE KARNA */
  // =============================
// AINEX SERVICES - JAVASCRIPT
// =============================

// Pay Button
document.getElementById("pay").addEventListener("click", function () {

    window.location.href =
    "upi://pay?pa=9236414171@pz&pn=AINEX%20SERVICES&am=90&cu=INR";

});

// Application Number (Only Numbers)
const appNo = document.getElementById("applicationno");

appNo.addEventListener("input", function () {

    this.value = this.value.replace(/\D/g, "").slice(0, 16);

});

// Password Auto Uppercase
const password = document.getElementById("password");

password.addEventListener("input", function () {

    this.value = this.value.toUpperCase();

});

// DOB Auto Format
const dob = document.getElementById("dob");

dob.addEventListener("input", function () {

    let value = this.value.replace(/\D/g, "").substring(0, 8);

    if (value.length > 4) {

        value =
        value.substring(0,2) + "/" +
        value.substring(2,4) + "/" +
        value.substring(4);

    }

    else if (value.length > 2) {

        value =
        value.substring(0,2) + "/" +
        value.substring(2);

    }

    this.value = value;

});

// Submit
function sendWA() {

    const app = appNo.value.trim();
    const pass = password.value.trim();
    const db = dob.value.trim();

    if (app.length < 6) {

        alert("Please Enter Valid Application Number");
        appNo.focus();
        return;

    }

    if (pass === "") {

        alert("Please Enter Password");
        password.focus();
        return;

    }

    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(db)) {

        alert("Please Enter Valid DOB (DD/MM/YYYY)");
        dob.focus();
        return;

    }

    const msg =
`🚗 *LEARNING LICENCE APPLY*

📄 Application Number
${app}

🔑 Password
${pass}

🎂 Date Of Birth
${db}`;

    window.open(

`https://wa.me/919236414171?text=${encodeURIComponent(msg)}`,

"_blank"

    );

}
</script>
